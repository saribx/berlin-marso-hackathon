[workspace]
channels = ["conda-forge"]
name = "marso_hackathon"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
test = "python test.py"
eval = "python eval.py"

[dependencies]
python = "3.12.*"

[pypi-dependencies]
# pinned to exact versions — edit here, then re-run `pixi install` to update pixi.lock
torch          = "==2.12.0"
torchvision    = "==0.27.0"
mani-skill     = "==3.0.1"
sapien         = "==3.0.3"
diffusers      = "==0.38.0"
gymnasium      = "==1.3.0"
hydra-core     = "==1.3.3"
omegaconf      = "==2.3.1"
numpy          = "==2.4.6"
transforms3d   = "==0.4.2"
tyro           = "*"
matplotlib     = "*"
tensorboard    = "*"
kagglehub      = "*"
warehouse_sort = {path = ".", editable = true}
